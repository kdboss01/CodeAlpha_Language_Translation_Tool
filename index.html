<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

    <div class="container">
        <h1>🌐 Language Translator</h1>
        <p class="subtitle">Powered by My Memory + Whisper</p>

        <!-- Top bar: source lang selector -->
        <div class="panel-row">

            <!-- LEFT PANEL: Input -->
            <div class="panel">
                <div class="panel-header">
                    <select id="sourceLang">
                        <option value="auto">Auto Detect</option>
                        <option value="en" selected>English</option>
                        <option value="hi">Hindi</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="es">Spanish</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="zh">Chinese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="ar">Arabic</option>
                    </select>

                    <!-- Mic button for Whisper voice input -->
                    <button id="micBtn" title="Record voice input">🎤 Record</button>
                    <span id="recordingStatus" class="recording-status"></span>
                </div>

                <textarea
                    id="sourceText"
                    placeholder="Type or speak your text here..."
                    maxlength="5000"
                ></textarea>

                <div class="char-count">
                    <span id="charCount">0</span> / 5000 characters
                </div>
            </div>

            <!-- SWAP BUTTON -->
            <div class="swap-col">
                <button id="swapBtn" title="Swap languages">⇄</button>
            </div>

            <!-- RIGHT PANEL: Output -->
            <div class="panel">
                <div class="panel-header">
                    <select id="targetLang">
                        <option value="hi" selected>Hindi</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="es">Spanish</option>
                        <option value="it">Italian</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="zh">Chinese</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="ar">Arabic</option>
                    </select>

                    <!-- Copy button -->
                    <button id="copyBtn" title="Copy translation">📋 Copy</button>

                    <!-- TTS button -->
                    <button id="ttsBtn" title="Read aloud">🔊 Listen</button>
                </div>

                <div id="outputBox" class="output-box">
                    <span class="placeholder">Translation will appear here...</span>
                </div>
            </div>

        </div>

        <!-- Translate button -->
        <div class="action-row">
            <button id="translateBtn" class="translate-btn">Translate</button>
        </div>

        <!-- Status / Error bar -->
        <div id="statusBar" class="status-bar hidden"></div>

    </div>

    <script src="/static/script.js"></script>
</body>
</html>
